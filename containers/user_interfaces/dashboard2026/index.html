<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DIX VISION — Operator Console (wave-02)</title>
    <style>
      /* Loading screen styling */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0a0a0a;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: monospace;
      }
      #loading-screen.hidden {
        display: none;
      }
      .loading-text {
        font-size: 18px;
        margin-top: 20px;
      }
      .loading-spinner {
        border: 4px solid #333;
        border-top: 4px solid #00ff00;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body class="bg-bg text-slate-100">
    <div id="loading-screen">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading DIX VISION Dashboard...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide loading screen after app mounts (timeout fallback)
      setTimeout(() => {
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
          loadingScreen.classList.add('hidden');
        }
      }, 5000);
    </script>
  </body>
</html>
