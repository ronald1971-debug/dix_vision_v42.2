syntax = "proto3";

// Belief State Contract — INV-DIX-02
//
// BeliefState is the single source of truth for all reality domains.
// Every engine publishes through this contract. No hidden realities.
//
// References:
// - docs/architecture/DIXVISION_ARCHITECTURAL_INVARIANTS.md
// - contracts/ownership_registry.yaml
// - core/coherence/belief_state.py

package dixvision.v42_2.belief_state;

import "market.proto";
import "trader_intelligence.proto";

// Market belief snapshot
message MarketBeliefs {
  int64 ts_ns = 1;
  string regime = 2;  // "TREND_UP", "TREND_DOWN", "RANGE", "VOL_SPIKE"
  double regime_confidence = 3;
  double volatility = 4;
  double liquidity_score = 5;
  double crowdedness = 6;
  map<string, double> price_signals = 7;
  map<string, double> volume_signals = 8;
}

// Trader belief snapshot
message TraderBeliefs {
  int64 ts_ns = 1;
  map<string, TraderProfile> trader_profiles = 2;
  map<string, TraderArchetypeBelief> archetype_beliefs = 3;
  
  message TraderProfile {
    string trader_id = 1;
    string archetype = 2;
    double agility = 3;
    double conviction = 4;
    double patience = 5;
  }
  
  message TraderArchetypeBelief {
    string archetype_name = 1;
    double dominance_score = 2;
    double performance_score = 3;
  }
}

// Strategy belief snapshot
message StrategyBeliefs {
  int64 ts_ns = 1;
  map<string, StrategyHypothesis> active_hypotheses = 2;
  map<string, StrategyPerformance> performances = 3;
  
  message StrategyHypothesis {
    string strategy_id = 1;
    string hypothesis = 2;
    double confidence = 3;
    int64 born_ts_ns = 4;
  }
  
  message StrategyPerformance {
    string strategy_id = 1;
    double sharpe_ratio = 2;
    double max_drawdown = 3;
    double total_pnl = 4;
    int64 last_update_ns = 5;
  }
}

// Portfolio belief snapshot
message PortfolioBeliefs {
  int64 ts_ns = 1;
  double total_value = 2;
  map<string, double> allocations = 3;
  map<string, double> exposures = 4;
  double correlation_risk = 5;
}

// Execution belief snapshot
message ExecutionBeliefs {
  int64 ts_ns = 1;
  double avg_fill_price = 2;
  double slippage = 3;
  double latency_ms = 4;
  int64 fill_count = 5;
}

// System belief snapshot
message SystemBeliefs {
  int64 ts_ns = 1;
  double cpu_utilization = 2;
  double memory_utilization = 3;
  double disk_utilization = 4;
  bool healthy = 5;
}

// Top-level BeliefState message — combines all reality domains
message BeliefState {
  int64 ts_ns = 1;
  
  MarketBeliefs market = 2;
  TraderBeliefs traders = 3;
  StrategyBeliefs strategies = 4;
  PortfolioBeliefs portfolio = 5;
  ExecutionBeliefs execution = 6;
  SystemBeliefs system = 7;
  
  string version = 8;
  string produced_by_engine = 9;
}