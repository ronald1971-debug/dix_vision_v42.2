repository:
  name: "celery-enhanced"
  url: "https://github.com/celery/celery.git"
  version: "5.3.6"
  description: "Celery enhanced task queue for background processing"

domain:
  type: "SYSTEM"
  priority: "HIGH"
  category: "task_queue"

container:
  enabled: true
  image: "dix-celery-enhanced:latest"
  build:
    dockerfile: "containers/github_repos/celery-enhanced/Dockerfile"
    context: "containers/github_repos/celery-enhanced"
  ports:
    - "9138:9138"
  volumes:
    - "./containers/github_repos/celery-enhanced/config:/app/config"
    - "./containers/github_repos/celery-enhanced/data:/app/data"
    - "./containers/github_repos/celery-enhanced/logs:/app/logs"
    - "./containers/github_repos/celery-enhanced/tasks:/app/tasks"
  environment:
    - "CELERY_ENHANCED_LOG_LEVEL=INFO"
    - "CELERY_ENHANCED_PERMISSION_LEVEL=READ_ONLY"
  resources:
    memory_limit: "512M"
    cpu_limit: "1.0"
    memory_reservation: "256M"
    cpu_reservation: "0.5"
  health_check:
    enabled: true
    interval: "30s"
    timeout: "10s"
    retries: 3

governance:
  enabled: true
  permission_level: "READ_ONLY"
  task_limits:
    max_task_duration: 3600
    max_task_retries: 10
    max_concurrent_tasks: 1000

adapter:
  type: "CeleryEnhancedDomainAdapter"
  concept_mappings:
    task: "async_operation"
    worker: "task_executor"
