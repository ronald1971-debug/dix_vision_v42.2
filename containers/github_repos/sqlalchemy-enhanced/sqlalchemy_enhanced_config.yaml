repository:
  name: "sqlalchemy-enhanced"
  url: "https://github.com/sqlalchemy/sqlalchemy.git"
  version: "2.0.23"
  description: "SQLAlchemy enhanced ORM for database operations"

domain:
  type: "SYSTEM"
  priority: "HIGH"
  category: "database_orm"

container:
  enabled: true
  image: "dix-sqlalchemy-enhanced:latest"
  build:
    dockerfile: "containers/github_repos/sqlalchemy-enhanced/Dockerfile"
    context: "containers/github_repos/sqlalchemy-enhanced"
  ports:
    - "9137:9137"
  volumes:
    - "./containers/github_repos/sqlalchemy-enhanced/config:/app/config"
    - "./containers/github_repos/sqlalchemy-enhanced/data:/app/data"
    - "./containers/github_repos/sqlalchemy-enhanced/logs:/app/logs"
    - "./containers/github_repos/sqlalchemy-enhanced/models:/app/models"
  environment:
    - "SQLALCHEMY_ENHANCED_LOG_LEVEL=INFO"
    - "SQLALCHEMY_ENHANCED_PERMISSION_LEVEL=READ_ONLY"
  resources:
    memory_limit: "512M"
    cpu_limit: "1.0"
    memory_reservation: "256M"
    cpu_reservation: "0.5"
  health_check:
    enabled: true
    interval: "30s"
    timeout: "10s"
    retries: 3

governance:
  enabled: true
  permission_level: "READ_ONLY"
  orm_limits:
    max_query_results: 10000
    max_query_time: 30
    max_connection_pool_size: 100

adapter:
  type: "SQLAlchemyEnhancedDomainAdapter"
  concept_mappings:
    query: "data_retrieval"
    model: "data_schema"
