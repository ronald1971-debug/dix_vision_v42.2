repository:
  name: "pytorch"
  url: "https://github.com/pytorch/pytorch.git"
  version: "2.1.0"
  description: "PyTorch deep learning for neural networks"

domain:
  type: "SYSTEM"
  priority: "HIGH"
  category: "deep_learning"

container:
  enabled: true
  image: "dix-pytorch:latest"
  build:
    dockerfile: "containers/github_repos/pytorch/Dockerfile"
    context: "containers/github_repos/pytorch"
  ports:
    - "9101:9101"
  volumes:
    - "./containers/github_repos/pytorch/config:/app/config"
    - "./containers/github_repos/pytorch/data:/app/data"
    - "./containers/github_repos/pytorch/logs:/app/logs"
    - "./containers/github_repos/pytorch/models:/app/models"
  environment:
    - "PYTORCH_LOG_LEVEL=INFO"
    - "PYTORCH_PERMISSION_LEVEL=READ_ONLY"
  resources:
    memory_limit: "4G"
    cpu_limit: "2.0"
    memory_reservation: "2G"
    cpu_reservation: "1.0"
  health_check:
    enabled: true
    interval: "30s"
    timeout: "10s"
    retries: 3

governance:
  enabled: true
  permission_level: "READ_ONLY"
  ml_limits:
    max_training_samples: 100000
    max_model_params: 1000000
    max_memory_usage: 4294967296

adapter:
  type: "PyTorchDomainAdapter"
  concept_mappings:
    model: "neural_network"
    tensor: "multidimensional_data"
