name: CI

on:
  push:
    branches: [main]
  pull_request:

# Force every composite/JS action (checkout, setup-node, pnpm/action-setup, …)
# to run on the bundled Node 24 runtime, silencing the Node 20 deprecation
# warnings. See https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build

  rust:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  rust-local-llm:
    # Verifies the `local-llm` feature compiles (pulls in llama.cpp via CMake +
    # bindgen). Runs only on Linux to avoid the slow MSVC toolchain install.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y cmake clang libclang-dev
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: local-llm
      - run: cargo check -p komorebi-llm --features local-llm

  rust-stt:
    # Verifies the `stt` feature compiles (pulls in whisper.cpp via CMake +
    # bindgen). Runs only on Linux for the same reason as rust-local-llm.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y cmake clang libclang-dev libasound2-dev
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: stt
      - run: cargo check -p komorebi-voice --features stt
