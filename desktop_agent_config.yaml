# DIX VISION Desktop AgentOS Configuration

# Runtime Configuration
runtime:
  log_level: INFO
  max_workers: 4
  task_timeout: 300
  enable_telemetry: true

# Agent Configuration
agents:
  indira:
    enabled: true
    research_timeout: 600
    max_concurrent_research: 3
    auto_research: true
    auto_analysis: true
    enable_execution_in_paper: true
    
  dyon:
    enabled: true
    analysis_timeout: 300
    max_concurrent_analysis: 2
    auto_analysis: true
    auto_research: true
    auto_advisory: true
    research_categories:
      - architecture
      - infrastructure
      - security
      - performance
      - scalability
      - observability
      - devops
      - database
      - distributed_systems

# Browser Configuration
browser:
  headless: true
  timeout: 30
  user_agent: "DIX VISION Desktop AgentOS/42.2"
  
  # Automation settings
  automation:
    enabled: true
    auto_scroll: true
    screenshot_on_action: true
    
  # Browser selection
  browser_type: "chrome"  # chrome, firefox, edge
  
# Desktop Configuration
desktop:
  sandbox_path: "./sandbox"
  allowed_applications:
    - "notepad"
    - "calculator"
    - "explorer"
    - "code"
    - "terminal"
    
  automation:
    enabled: true
    mouse_control: true
    keyboard_control: true
    
  # Process monitoring
  process_monitoring:
    enabled: true
    monitor_interval: 5

# Memory Configuration
memory:
  backend: sqlite
  path: "./data/agent_memory.db"
  max_size_mb: 1000
  
  indira:
    knowledge_retention_days: 90
    trader_retention_days: 30
    strategy_retention_days: 60
    
  dyon:
    repository_retention_days: 90
    skill_retention_days: 120

# Voice Configuration
voice:
  enabled: true
  wake_word: "indira"
  
  stt:
    engine: "whisper"  # whisper, deepgram, openrouter
    model: "base"
    language: "en"
    
  tts:
    engine: "piper"  # piper, sovits, openrouter
    voice: "en_US-lessac-medium"
    speed: 1.0
    volume: 1.0

# Skill Configuration
skills:
  auto_register: true
  skill_paths:
    - "./desktop_agent/skills"
    - "./custom_skills"
    
  categories:
    - research
    - trading
    - browser
    - engineering
    - social
    - system

# Governance Configuration
governance:
  enabled: true
  policy_enforcement: true
  risk_assessment: true
  
  policies:
    safety:
      enabled: true
      require_human_approval: true
      
    privacy:
      enabled: true
      data_encryption: true
      
    security:
      enabled: true
      sandbox_enforcement: true

# Telemetry Configuration
telemetry:
  enabled: true
  log_level: INFO
  log_path: "./data/telemetry"
  metrics_port: 9090
  
  # Performance monitoring
  performance_monitoring:
    enabled: true
    cpu_threshold: 80
    memory_threshold: 85
    
  # Activity logging
  activity_logging:
    enabled: true
    log_all_actions: true
    log_agent_decisions: true

# Integration Configuration
integration:
  komorebi:
    enabled: true
    api_endpoint: "http://localhost:1420"
    
  cloud_services:
    openrouter:
      enabled: true  # REQUIRED for LLM features
      api_key: "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"

    deepgram:
      enabled: false  # OPTIONAL - for enhanced speech-to-text
      api_key: ""  # Add your Deepgram API key here if enabling

# Development Configuration
development:
  debug_mode: false
  hot_reload: false
  verbose_logging: false
  
  testing:
    mock_browser: false
    mock_voice: false
    skip_governance: false
