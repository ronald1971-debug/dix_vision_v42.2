# DIX VISION v42.2 - Docker Compose Configuration
# Main orchestration file for containerized deployment
# This file orchestrates all containers for a clean, organized system

version: '3.8'

services:
  # Core Application Container
  # Houses all core application code and logic
  dix-vision-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dix-vision-core
    volumes:
      - app-data:/app/data
      - checkpoints:/app/checkpoints
      - logs:/app/logs
      - ./cognitive_os:/app/cognitive_os
      - ./execution_unified:/app/execution_unified
      - ./evolution_engine:/app/evolution_engine
      - ./world_model:/app/world_model
      - ./adapters:/app/adapters
      - ./cognitive_control_center:/app/cognitive_control_center
      - ./state:/app/state
      - ./governance_unified:/app/governance_unified
      - ./tests:/app/tests
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
    networks:
      - dix-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import dix_vision_unified; print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Documentation Server Container
  # Serves all documentation and reports
  dix-vision-docs:
    build:
      context: ./docker/docs
      dockerfile: Dockerfile
    container_name: dix-vision-docs
    ports:
      - "8080:80"
    volumes:
      - ./docs:/usr/share/nginx/html:ro
    networks:
      - dix-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Configuration Management Container
  # Centralized configuration management
  dix-vision-config:
    build:
      context: ./docker/config
      dockerfile: Dockerfile
    container_name: dix-vision-config
    volumes:
      - ./config:/app/config
      - .env.template:/app/.env.template:ro
    networks:
      - dix-network
    restart: unless-stopped

  # Development Environment Container
  # Complete development and testing environment
  dix-vision-dev:
    build:
      context: ./docker/dev
      dockerfile: Dockerfile
    container_name: dix-vision-dev
    volumes:
      - .:/workspace
      - dev-data:/workspace/.dev
      - dev-cache:/workspace/.cache
    environment:
      - DEV_MODE=true
      - PYTHONUNBUFFERED=1
    networks:
      - dix-network
    profiles:
      - dev
    stdin_open: true
    tty: true

  # Backup and Archive Container
  # Archival of old reports and historical data
  dix-vision-backup:
    build:
      context: ./docker/backup
      dockerfile: Dockerfile
    container_name: dix-vision-backup
    volumes:
      - backup-data:/backup
      - ./archive:/source:ro
    networks:
      - dix-network
    restart: unless-stopped

volumes:
  # Application data volume
  app-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data
  
  # Checkpoints volume (persistent)
  checkpoints:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./checkpoints
  
  # Logs volume (persistent)
  logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./logs
  
  # Development data volume
  dev-data:
    driver: local
  
  # Development cache volume
  dev-cache:
    driver: local
  
  # Backup data volume
  backup-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./backup

networks:
  # Main network for inter-container communication
  dix-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16