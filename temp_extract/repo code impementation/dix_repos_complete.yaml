# DIX VISION v42.2 — Complete Repository Integration Map
# Generated: 2026-05-08
# Total repos: 149
# Tiers: S (integrate now) → A (next 3-6 months) → B (6-12 months) → C (future/research)
#
# Each entry contains:
#   url:        clone URL
#   tier:       S / A / B / C
#   dix_gap:    which declared-missing DIX file(s) this fills
#   dix_module: which DIX package it belongs to
#   what_to_extract: the specific files/classes to pull from this repo
#   what_to_ignore:  parts that conflict with DIX architecture
#   session_prompt:  the one-line AI session task

repos:

  # ============================================================
  # TIER S — Integrate now. Fills P0/P1 gaps. Battle-tested code
  #          maps directly to declared DIX contracts.
  # ============================================================

  - name: ccxt
    url: https://github.com/ccxt/ccxt.git
    tier: S
    dix_gap:
      - execution_engine/adapters/binance.py
      - execution_engine/adapters/oanda.py
    dix_module: execution_engine/adapters
    what_to_extract:
      - ccxt/python/ccxt/binance.py — create_order, cancel_order, fetch_order, fetch_balance, _handle_errors
      - ccxt/python/ccxt/oanda.py — same interface
      - ccxt/python/ccxt/base/exchange.py — retry logic, rate limiting
    what_to_ignore:
      - ccxt CLI tooling
      - ccxt REST server
      - anything touching datetime.now() directly (replace with DIX TimeSource)
    session_prompt: >
      Wrap ccxt Binance create_order/cancel_order behind AdapterBase,
      map responses to ExecutionEvent, inject TimeSource, keep error/retry logic intact.

