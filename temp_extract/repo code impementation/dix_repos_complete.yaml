      - hftbacktest/latency/ — latency model classes
      - hftbacktest/data/ — orderbook replay structures
    what_to_ignore:
      - hftbacktest CLI
      - Rust bindings (use Python layer only until PyO3 phase)
      - global numpy.random state (replace with seeded RNG)
    session_prompt: >
      Adapt hftbacktest slippage + latency math into DIX SlippageModel and LatencyModel,
      inject seed for INV-15 determinism, implement core/contracts/simulation.py interface.

