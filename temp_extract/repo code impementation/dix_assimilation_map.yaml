# Restriction: NEVER in deterministic RUNTIME hot_path
# ================================================================

- repo: pytorch/pytorch
  pip: torch torchvision torchaudio
  extract:
    - torch.nn → model architectures for offline learning
    - torch.optim → Adam, AdamW for policy optimization
    - torch.utils.data → DataLoader for batch training
  fills:
    - evolution_engine/ (RL policy networks)
    - learning_engine/trader_abstraction/ (embedding models)
    - sensory/neuromorphic/ (SNN training via Norse)
  safety_rails:
    - torch NEVER imported in: hot_path/, governance_engine/, system_engine/ RUNTIME
    - torch.manual_seed() called with registry seed for reproducibility
    - Model inference in RUNTIME uses TorchScript frozen models only (deterministic)

- repo: google/jax
  pip: jax jaxlib
  extract:
    - jax/numpy → drop-in numpy for vectorized simulation math
    - jax.jit → JIT compilation for offline batch computation
    - jax.vmap → vectorized simulation batches
  fills:
    - simulation/parallel_runner.py (JAX-vectorized batch simulations)
    - evolution_engine/genetic/fitness_inheritance.py
  safety_rails:
    - JAX NEVER in RUNTIME tier — hardware-dependent, breaks INV-15
    - jax.random uses explicit key passing — no global state
    - CPU-only JAX for CI replay tests — GPU for training

- repo: openai/triton + facebookresearch/xformers
  pip: triton xformers
  extract:
    - Triton: custom CUDA kernels for attention — offline training acceleration
    - xformers: memory-efficient attention for large context windows
  fills:
    - learning_engine/ (training acceleration)
  safety_rails:
    - STRICTLY offline training only — NEVER runtime
    - NEVER in CI replay tests — hardware-dependent output


# ================================================================
# SECTION 20 — NEW VALIDATION TOOLS (from manifest)
# These don't come from repos — they USE the repos above as dependencies
# ================================================================

new_validation_tools:
  - file: tools/repo_assimilation_validator.py
    depends_on: [networkx, tools/authority_lint.py]
    purpose: >
      Validates every integrated module has: registry entry, governance policy,
      contract binding, tests, observability hook. Fails CI if any module is unregistered.

  - file: tools/runtime_determinism_check.py
    depends_on: [z3-solver, hypothesis]
    purpose: >
      Proves RUNTIME functions are deterministic: same inputs → same outputs.
      Uses CrossHair symbolic execution + Z3 constraint solving.

  - file: tools/replay_integrity_check.py
    depends_on: [z3-solver, state/ledger/]
    purpose: >
      Replays last N ledger entries, verifies hash chain integrity,
      verifies all ExecutionEvents reproducible from seed + events.

  - file: tools/governance_boundary_check.py
    depends_on: [z3-solver, registry/authority_matrix.yaml]
    purpose: >
      Encodes authority graph as Z3 constraints. Proves no path exists from
      any OFFLINE engine to ExecutionEvent without passing through governance gate.

  - file: tools/no_hidden_state_check.py
    depends_on: [crosshair-tool, ast module]
    purpose: >
      AST + CrossHair scan of all RUNTIME modules.
      Detects: global variable mutations, module-level mutable state,
      datetime.now() calls outside TimeSource wrapper.

  - file: tools/hotpath_isolation_check.py
    depends_on: [tools/authority_lint.py, ast module]
    purpose: >
      Extends authority_lint to verify hot_path/ modules import nothing from:
      torch, jax, ray, faiss, neo4j, chromadb, scrapy, playwright.

  - file: tools/event_lineage_validator.py
    depends_on: [state/ledger/reader.py, networkx]
    purpose: >
      For each ExecutionEvent in ledger, traces causal chain back to originating
      SignalEvent. Flags any ExecutionEvent with broken provenance chain.

  - file: tools/registry_consistency_check.py
    depends_on: [registry/*.yaml, core/contracts/]
    purpose: >
      Every module referenced in registry/*.yaml must exist on disk.
      Every module on disk in registered packages must appear in registry.
      Mismatch = CI FAIL.

  - file: tools/dependency_audit.py
    depends_on: [networkx, pipdeptree]
    purpose: >
      Builds full dependency graph of DIX + all integrated packages.
      Detects: version conflicts, known CVEs (via pip-audit), circular deps.
      Fixes dep_graph_valid: False in total_validation.py output.

  - file: tools/upstream_sync_monitor.py
    depends_on: [external_sync/upstream_versions.yaml, requests]
    purpose: >
      Checks each integrated repo's upstream for: new releases, security advisories,
      breaking API changes. Generates migration report. Run weekly in CI.

  - file: tools/hotpath_isolation_check.py
    depends_on: [ast, importlib]
    purpose: >
      Static import analysis of hot_path/ modules.
      Any import of a heavy library = CI FAIL.

  - file: tools/plugin_sandbox_check.py
    depends_on: [registry/plugins.yaml, enforcement/]
    purpose: >
      Verifies all plugins declared in registry run through sandbox boundary.
      Plugin must not have direct import of execution_engine core modules.
