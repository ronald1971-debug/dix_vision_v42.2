# DIX VISION v42.2 — Canonical Repository Assimilation Map
# Follows manifest v42.2 integration protocol
# Each entry: what to extract → where it goes in DIX → safety constraints
# Generated: 2026-05-08
#
# PROTOCOL (per manifest phases 1-8):
#   1. Clone repo → /external_imports/<name>/
#   2. Extract ONLY listed files/classes
#   3. Adapt to listed DIX contract
#   4. Register in registry/*.yaml
#   5. Wire to event bus / ledger
#   6. Generate tests
#   7. Run authority_lint --strict
#   8. Run pytest — must stay green
# ================================================================


# ================================================================
# SECTION 1 — PROTOCOLS / SERIALIZATION
# Manifest ref: "PROTOCOLS / SERIALIZATION"
# ================================================================

- repo: google/protobuf
  pip: protobuf grpcio grpcio-tools
  extract:
    - protoc compiler patterns for .proto → Python dataclass generation
    - google/protobuf/descriptor.py — message reflection
  fills:
    - contracts/execution.proto
    - contracts/governance.proto
    - contracts/ledger.proto
    - contracts/market.proto
    - contracts/system.proto
  dix_contract: contracts/events.proto (already exists — extend same pattern)
  how: >
    Run protoc on each new .proto file.
    Generated Python classes become frozen dataclasses in core/contracts/.
    Keep pydantic as primary runtime contract, protobuf for cross-language boundary only.
  safety_rails:
    - proto files are data contracts only — no logic
    - generated code must pass authority_lint
    - never import grpc runtime into hot_path/

- repo: ijl/orjson
  pip: orjson
  extract:
    - orjson.dumps / orjson.loads — drop-in json replacement
  fills:
    - state/ledger/append.py (faster serialization)
    - ui/server.py (FastAPI response serialization)
  how: Replace json.dumps with orjson.dumps in ledger writes and API responses.
  safety_rails:
    - orjson is deterministic for same input — safe for replay
    - use only for serialization, never for contract validation

- repo: jcrist/msgspec
  pip: msgspec
  extract:
    - msgspec.Struct — zero-copy typed structs
    - msgspec.json.encode / decode
  fills:
    - execution_engine/hot_path/ (sub-microsecond serialization)
  how: >
    Replace dict-based hot_path event passing with msgspec.Struct.
    Benchmark against current pydantic models — only adopt if p99 improves.
  safety_rails:
    - hot_path only — offline code keeps pydantic for richer validation
    - msgspec.Struct must be validated against core/contracts/ pydantic models at boundary


# ================================================================
# SECTION 2 — EVENT STREAMING / CEP
# Manifest ref: "EVENT STREAMING / CEP"
# Fills: execution/async_bus.py, system_engine/event_processing/
# ================================================================

- repo: bytewax/bytewax
  pip: bytewax
  extract:
    - bytewax/dataflow.py — Dataflow, map, filter, windowed_join
    - bytewax/window.py — TumblingWindow, SlidingWindow
    - bytewax/inputs.py — ManualInputConfig (for DIX event sources)
  fills:
    - execution/async_bus.py
    - system_engine/event_processing/ (CEP layer)
  dix_contract: core/contracts/events.py (SignalEvent, HazardEvent)
  how: >
    Build DIX event bus as Bytewax Dataflow.
    Each engine subscribes as a Dataflow operator.
    Hazard detection becomes a windowed stateful operator over HazardEvent stream.
    OFFLINE only initially — benchmark vs asyncio queue before migrating RUNTIME.
  safety_rails:
    - Bytewax operators must be pure functions — no side effects in operator body
    - All state mutations must still write to DIX ledger
    - RUNTIME migration requires replay determinism proof first

- repo: robinhood/faust
  pip: faust-streaming
  extract:
    - faust/app.py — agent decorator pattern (event stream consumer)
    - faust/streams.py — Stream.filter(), Stream.group_by()
    - faust/models.py — Record base for typed stream messages
  fills:
    - execution/event_emitter.py
    - system_engine/event_processing/
  how: >
    Use Faust Record as alternative to pydantic for stream message typing.
    Extract agent pattern for news_fanout — each feed becomes a Faust agent.
    Do NOT use Faust's built-in Kafka transport — wire to DIX event bus instead.
  safety_rails:
    - Faust's Kafka dependency must be sandboxed behind DIX event bus abstraction
    - Never let Faust manage DIX state — Faust is transport only

- repo: espertechinc/esper (concepts only — Java)
  pip: streamz  # Python CEP alternative
  extract:
    - CEP pattern language: every/where/within clauses (conceptual extraction)
    - Esper EPL query patterns → reimplement as streamz Filter+Window
  fills:
    - system_engine/event_processing/
    - system_engine/hazard_sensors/ (multi-event hazard patterns)
  how: >
    Extract Esper's temporal CEP pattern concepts.
    Reimplement as streamz-based pattern matchers in Python.
    Example: HAZ-DRIFT-COMPOSITE = (3 HazardEvents within 30s) → escalate.
  safety_rails:
    - CEP patterns must be registered in registry/constraint_rules.yaml
    - All pattern matches emit HazardEvent — never direct action


