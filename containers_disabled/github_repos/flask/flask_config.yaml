repository:
  name: "flask"
  url: "https://github.com/pallets/flask.git"
  version: "3.0.0"
  description: "Flask web framework for web applications"

domain:
  type: "SYSTEM"
  priority: "HIGH"
  category: "web_framework"

container:
  enabled: true
  image: "dix-flask:latest"
  build:
    dockerfile: "containers/github_repos/flask/Dockerfile"
    context: "containers/github_repos/flask"
  ports:
    - "9135:9135"
  volumes:
    - "./containers/github_repos/flask/config:/app/config"
    - "./containers/github_repos/flask/data:/app/data"
    - "./containers/github_repos/flask/logs:/app/logs"
    - "./containers/github_repos/flask/applications:/app/applications"
  environment:
    - "FLASK_LOG_LEVEL=INFO"
    - "FLASK_PERMISSION_LEVEL=READ_ONLY"
  resources:
    memory_limit: "512M"
    cpu_limit: "1.0"
    memory_reservation: "256M"
    cpu_reservation: "0.5"
  health_check:
    enabled: true
    interval: "30s"
    timeout: "10s"
    retries: 3

governance:
  enabled: true
  permission_level: "READ_ONLY"
  framework_limits:
    max_request_size: 10485760
    max_response_time: 30
    max_concurrent_requests: 1000

adapter:
  type: "FlaskDomainAdapter"
  concept_mappings:
    route: "web_endpoint"
    request: "http_signal"
