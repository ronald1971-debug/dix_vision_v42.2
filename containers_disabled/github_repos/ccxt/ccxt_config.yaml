# CCXT External Repository Configuration
# Configuration for CCXT cryptocurrency trading integration

# Repository Identification
repository:
  name: "ccxt"
  url: "https://github.com/ccxt/ccxt.git"
  version: "4.1.0"
  description: "CryptoCurrency eXchange Trading Library for cryptocurrency trading"

# Domain Classification
domain:
  type: "MARKET"
  priority: "CRITICAL"
  category: "trading_execution"

# Container Configuration
container:
  enabled: true
  image: "dix-ccxt:latest"
  build:
    dockerfile: "containers/github_repos/ccxt/Dockerfile"
    context: "containers/github_repos/ccxt"
  ports:
    - "8080:8080"
  volumes:
    - "./containers/github_repos/ccxt/config:/app/config"
    - "./containers/github_repos/ccxt/data:/app/data"
    - "./containers/github_repos/ccxt/logs:/app/logs"
  environment:
    - "CCXT_LOG_LEVEL=INFO"
    - "CCXT_RATE_LIMIT=true"
  resources:
    memory_limit: "1g"
    cpu_limit: "1.5"
    memory_reservation: "512m"
    cpu_reservation: "0.5"
  health_check:
    enabled: true
    interval: "30s"
    timeout: "10s"
    retries: 3
    command: "python /app/health_check.py"

# Governance Configuration
governance:
  enabled: true
  permission_level: "READ_ONLY"
  safety_checks:
    enabled: true
    dangerous_keywords: ["delete", "drop", "destroy", "format", "force_close"]
    input_validation: true
    output_sanitization: true
    position_limits:
      max_position_value: 10000
      max_position_percentage: 0.1
      max_daily_trades: 100
    risk_parameters:
      max_leverage: 3.0
      max_slippage: 0.05
      min_liquidity: 1000
  audit_logging:
    enabled: true
    log_level: "INFO"
    retention_days: 90
  operator_authority:
    required_for_execution: true
    approval_timeout: "1h"
    emergency_override: true

# Adapter Configuration
adapter:
  type: "CCXTDomainAdapter"
  data_format: "JSON"
  concept_mappings:
    bid: "buy_price"
    ask: "sell_price"
    base: "base_currency"
    quote: "quote_currency"
    maker: "liquidity_provider"
    taker: "liquidity_consumer"
  transformations:
    - name: "orderbook_standardization"
      enabled: true
    - name: "ticker_enhancement"
      enabled: true
    - name: "trade_classification"
      enabled: true
    - name: "portfolio_calculation"
      enabled: true
  enhancements:
    add_metadata: true
    add_context: true
    cognitive_enhancement: true

# Security Configuration
security:
  credential_management:
    use_secrets_manager: true
    credential_file: ".dix_secrets.env"
    api_keys_required: true
  rate_limiting:
    enabled: true
    requests_per_minute: 120
    burst_size: 10
  input_validation:
    enabled: true
    max_size_mb: 10
    allowed_formats: ["json"]
  output_sanitization:
    enabled: true
    remove_sensitive_data: true
  encryption:
    enabled: false
    method: "aes-256"

# Performance Configuration
performance:
  cache_enabled: true
  cache_ttl: 60  # 60 seconds for market data
  connection_pool:
    enabled: true
    max_connections: 5
    min_connections: 1
  timeout:
    connection: 30
    read: 60
    write: 30
  retry_policy:
    enabled: true
    max_retries: 3
    backoff_factor: 2

# Monitoring Configuration
monitoring:
  enabled: true
  metrics:
    enabled: true
    collection_interval: 30
    metrics_port: 9090
  logging:
    enabled: true
    log_level: "INFO"
    log_file: "logs/ccxt.log"
  health_checks:
    enabled: true
    check_interval: 30
    exchange_health_check: true
  alerting:
    enabled: false
    webhook_url: ""
    alert_conditions:
      - metric: "error_rate"
        threshold: 0.05
        operator: "greater_than"
      - metric: "latency"
        threshold: 5000
        operator: "greater_than"

# Integration Configuration
integration:
  enabled: true
  startup_order: 20  # Start after infrastructure services
  dependencies:
    - "redis"
    - "postgres"
    - "prometheus"
  auto_discovery:
    enabled: false
  data_flow:
    - source: "ccxt_api"
      destination: "redis_cache"
      transform: "ccxt_adapter"
    - source: "ccxt_trades"
      destination: "postgres_events"
      transform: "trade_adapter"

# Supported Exchanges Configuration
supported_exchanges:
  binance:
    enabled: true
    features:
      - "spot"
      - "margin"
      - "futures"
    rate_limits:
      requests_per_minute: 1200
  kraken:
    enabled: true
    features:
      - "spot"
      - "margin"
    rate_limits:
      requests_per_minute: 200
  coinbase:
    enabled: true
    features:
      - "spot"
    rate_limits:
      requests_per_minute: 200
  poloniex:
    enabled: false
    features:
      - "spot"
    rate_limits:
      requests_per_minute: 100

# Trading Configuration
trading:
  default_order_type: "limit"
  order_timeout: 300
  partial_fills:
    enabled: true
    minimum_fill_percentage: 90
  price_validation:
    enabled: true
    max_price_deviation: 0.02  # 2%
  market_conditions:
    volatility_threshold: 0.05
    liquidity_threshold: 10000

# Testing Configuration
testing:
  integration_tests:
    enabled: true
    test_directory: "containers/github_repos/ccxt/tests"
    test_timeout: 300
  unit_tests:
    enabled: true
    coverage_threshold: 80
  performance_tests:
    enabled: false
    load_test_duration: 60

# Documentation Configuration
documentation:
  api_docs:
    enabled: true
    generate_on_build: true
  integration_guide:
    enabled: true
    location: "docs/integrations/ccxt.md"
  examples:
    enabled: true
    location: "containers/github_repos/ccxt/examples/"

# Deployment Configuration
deployment:
  environment: "development"
  scaling:
    min_instances: 1
    max_instances: 3
    target_cpu_percent: 70
  rollout_strategy:
    type: "rolling"
    max_unavailable: 1
    max_surge: 1

# Backup Configuration
backup:
  enabled: true
  schedule: "hourly"
  retention: 24
  backup_location: "containers/github_repos/ccxt/backups/"
