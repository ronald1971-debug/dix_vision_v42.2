# Celery External Repository Configuration
# Configuration for Celery distributed task queue integration

repository:
  name: "celery"
  url: "https://github.com/celery/celery.git"
  version: "5.3.6"
  description: "Celery distributed task queue for background job processing"

domain:
  type: "SYSTEM"
  priority: "CRITICAL"
  category: "task_queue"

container:
  enabled: true
  image: "dix-celery:latest"
  build:
    dockerfile: "containers/github_repos/celery/Dockerfile"
    context: "containers/github_repos/celery"
  ports:
    - "5555:5555"
  volumes:
    - "./containers/github_repos/celery/config:/app/config"
    - "./containers/github_repos/celery/data:/app/data"
    - "./containers/github_repos/celery/logs:/app/logs"
    - "./containers/github_repos/celery/tasks:/app/tasks"
  environment:
    - "CELERY_LOG_LEVEL=INFO"
    - "CELERY_PERMISSION_LEVEL=READ_ONLY"
    - "CELERY_BROKER_URL=redis://redis-service:6379/0"
    - "CELERY_RESULT_BACKEND=redis://redis-service:6379/0"
  resources:
    memory_limit: "1G"
    cpu_limit: "2.0"
    memory_reservation: "512M"
    cpu_reservation: "1.0"
  health_check:
    enabled: true
    interval: "30s"
    timeout: "10s"
    retries: 3
    command: "python /app/health_check.py"

governance:
  enabled: true
  permission_level: "READ_ONLY"
  safety_checks:
    enabled: true
    dangerous_keywords: ["system", "subprocess", "exec", "eval", "shell"]
    input_validation: true
    output_sanitization: true
    task_limits:
      enabled: true
      max_task_duration: 3600
      max_retries: 3
      task_timeout: 300
      max_concurrent_tasks: 50
    max_task_args_length: 1048576
  audit_logging:
    enabled: true
    log_level: "INFO"
    retention_days: 90
  operator_authority:
    required_for_execution: true
    approval_timeout: "1h"
    emergency_override: true

adapter:
  type: "CeleryDomainAdapter"
  data_format: "JSON"
  concept_mappings:
    task: "cognitive_operation"
    worker: "processing_unit"
    queue: "cognitive_channel"
    broker: "message_transport"
    result: "operation_outcome"
  transformations:
    - name: "task_standardization"
      enabled: true
    - name: "result_enhancement"
      enabled: true
    - name: "worker_classification"
      enabled: true
  enhancements:
    add_metadata: true
    add_context: true
    cognitive_enhancement: true

security:
  credential_management:
    use_secrets_manager: true
    credential_file: ".dix_secrets.env"
    broker_password_required: true
  task_security:
    enabled: true
    blocked_task_modules: ["os.system", "subprocess.run", "exec", "eval"]
    allowed_result_types: ["dict", "list", "str", "int", "float", "bool", "NoneType"]
  input_validation:
    enabled: true
    max_size_mb: 1
  output_sanitization:
    enabled: true
    remove_sensitive_data: true

performance:
  cache_enabled: true
  cache_ttl: 60
  connection_pool:
    enabled: true
    max_connections: 20
    min_connections: 5
  timeout:
    connection: 30
    task: 300
    result: 60
  retry_policy:
    enabled: true
    max_retries: 3
    backoff_factor: 2

monitoring:
  enabled: true
  metrics:
    enabled: true
    collection_interval: 30
    metrics_port: 9093
  logging:
    enabled: true
    log_level: "INFO"
    log_file: "logs/celery.log"
  health_checks:
    enabled: true
    check_interval: 30
    worker_health_check: true
    queue_health_check: true
  alerting:
    enabled: false

integration:
  enabled: true
  startup_order: 40
  dependencies:
    - "redis"
    - "postgres"
  auto_discovery:
    enabled: true
  data_flow:
    - source: "task_queue"
      destination: "task_results"
      transform: "celery_adapter"

celery_configuration:
  app_name: "dixvision_tasks"
  broker_url: "redis://redis-service:6379/0"
  result_backend: "redis://redis-service:6379/0"
  task_serializer: "json"
  accept_content: ["json"]
  result_serializer: "json"
  timezone: "UTC"
  enable_utc: true
  task_track_started: true
  task_time_limit: 3600
  task_soft_time_limit: 300
  task_acks_late: true
  worker_prefetch_multiplier: 4
  task_max_retries: 3
  task_default_retry_delay: 60
  worker_concurrency: 4
  worker_max_tasks_per_child: 1000

task_configuration:
  default_queue: "default"
  task_routes:
    - pattern: "market.*"
      queue: "market_tasks"
      priority: 5
    - pattern: "cognitive.*"
      queue: "cognitive_tasks"
      priority: 10
    - pattern: "system.*"
      queue: "system_tasks"
      priority: 1
  priority_default: 5
  priority_max: 10
  priority_min: 1

worker_configuration:
  broker_connection_retry: true
  broker_connection_retry_on_startup: true
  broker_connection_max_retries: 5
  worker_send_sent_event: true
  worker_disable_rate_limits: false
  worker_prefetch_multiplier: 4
  worker_concurrency: 4

testing:
  integration_tests:
    enabled: true
    test_directory: "containers/github_repos/celery/tests"
    test_timeout: 300
  unit_tests:
    enabled: true
    coverage_threshold: 80

documentation:
  api_docs:
    enabled: true
    generate_on_build: true
  integration_guide:
    enabled: true
    location: "docs/integrations/celery.md"

deployment:
  environment: "development"
  scaling:
    min_instances: 1
    max_instances: 5
    target_cpu_percent: 70
  rollout_strategy:
    type: "rolling"
    max_unavailable: 1
    max_surge: 1
