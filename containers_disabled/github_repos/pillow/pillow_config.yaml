repository:
  name: "pillow"
  url: "https://github.com/python-pillow/Pillow.git"
  version: "10.1.0"
  description: "Pillow image processing library"

domain:
  type: "SYSTEM"
  priority: "HIGH"
  category: "image_processing"

container:
  enabled: true
  image: "dix-pillow:latest"
  build:
    dockerfile: "containers/github_repos/pillow/Dockerfile"
    context: "containers/github_repos/pillow"
  ports:
    - "9104:9104"
  volumes:
    - "./containers/github_repos/pillow/config:/app/config"
    - "./containers/github_repos/pillow/data:/app/data"
    - "./containers/github_repos/pillow/logs:/app/logs"
    - "./containers/github_repos/pillow/images:/app/images"
  environment:
    - "PILLOW_LOG_LEVEL=INFO"
    - "PILLOW_PERMISSION_LEVEL=READ_ONLY"
  resources:
    memory_limit: "512M"
    cpu_limit: "1.0"
    memory_reservation: "256M"
    cpu_reservation: "0.5"
  health_check:
    enabled: true
    interval: "30s"
    timeout: "10s"
    retries: 3

governance:
  enabled: true
  permission_level: "READ_ONLY"
  image_limits:
    max_image_size: 52428800
    max_resolution: 8192
    max_operations_per_image: 100

adapter:
  type: "PillowDomainAdapter"
  concept_mappings:
    image: "visual_asset"
    processing: "visual_manipulation"
