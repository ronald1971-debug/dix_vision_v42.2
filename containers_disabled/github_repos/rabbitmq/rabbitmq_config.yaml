repository:
  name: "rabbitmq"
  url: "https://github.com/rabbitmq/rabbitmq-server.git"
  version: "3.12.0"
  description: "RabbitMQ messaging for asynchronous communication"

domain:
  type: "SYSTEM"
  priority: "HIGH"
  category: "messaging"

container:
  enabled: true
  image: "dix-rabbitmq:latest"
  build:
    dockerfile: "containers/github_repos/rabbitmq/Dockerfile"
    context: "containers/github_repos/rabbitmq"
  ports:
    - "9116:9116"
  volumes:
    - "./containers/github_repos/rabbitmq/config:/app/config"
    - "./containers/github_repos/rabbitmq/data:/app/data"
    - "./containers/github_repos/rabbitmq/logs:/app/logs"
    - "./containers/github_repos/rabbitmq/queues:/app/queues"
  environment:
    - "RABBITMQ_LOG_LEVEL=INFO"
    - "RABBITMQ_PERMISSION_LEVEL=READ_ONLY"
  resources:
    memory_limit: "512M"
    cpu_limit: "1.0"
    memory_reservation: "256M"
    cpu_reservation: "0.5"
  health_check:
    enabled: true
    interval: "30s"
    timeout: "10s"
    retries: 3

governance:
  enabled: true
  permission_level: "READ_ONLY"
  messaging_limits:
    max_message_size: 10485760
    max_queue_size: 1000000
    max_publish_rate: 10000

adapter:
  type: "RabbitMQDomainAdapter"
  concept_mappings:
    queue: "message_channel"
    exchange: "message_router"
