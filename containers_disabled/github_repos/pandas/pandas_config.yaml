# Pandas External Repository Configuration
# Configuration for Pandas data analysis integration

repository:
  name: "pandas"
  url: "https://github.com/pandas-dev/pandas.git"
  version: "2.1.3"
  description: "Pandas data analysis for data manipulation and analysis"

domain:
  type: "SYSTEM"
  priority: "HIGH"
  category: "data_analysis"

container:
  enabled: true
  image: "dix-pandas:latest"
  build:
    dockerfile: "containers/github_repos/pandas/Dockerfile"
    context: "containers/github_repos/pandas"
  ports:
    - "9097:9097"
  volumes:
    - "./containers/github_repos/pandas/config:/app/config"
    - "./containers/github_repos/pandas/data:/app/data"
    - "./containers/github_repos/pandas/logs:/app/logs"
    - "./containers/github_repos/pandas/datasets:/app/datasets"
  environment:
    - "PANDAS_LOG_LEVEL=INFO"
    - "PANDAS_PERMISSION_LEVEL=READ_ONLY"
  resources:
    memory_limit: "2G"
    cpu_limit: "2.0"
    memory_reservation: "1G"
    cpu_reservation: "1.0"
  health_check:
    enabled: true
    interval: "30s"
    timeout: "10s"
    retries: 3
    command: "python /app/health_check.py"

governance:
  enabled: true
  permission_level: "READ_ONLY"
  safety_checks:
    enabled: true
    dangerous_keywords: ["eval", "exec", "compile", "dangerous"]
    input_validation: true
    output_sanitization: true
    data_limits:
      enabled: true
      max_dataframe_rows: 1000000
      max_dataframe_columns: 1000
      max_memory_usage: 1073741824
      max_execution_time: 600
  audit_logging:
    enabled: true
    log_level: "INFO"
    retention_days: 90
  operator_authority:
    required_for_execution: true
    approval_timeout: "1h"
    emergency_override: true

adapter:
  type: "PandasDomainAdapter"
  data_format: "JSON"
  concept_mappings:
    dataframe: "data_matrix"
    series: "data_vector"
    index: "data_key"
    column: "data_attribute"
    analysis: "data_insight"
  transformations:
    - name: "dataframe_standardization"
      enabled: true
    - name: "analysis_enhancement"
      enabled: true
    - name: "data_quality_assessment"
      enabled: true
  enhancements:
    add_metadata: true
    add_context: true
    cognitive_enhancement: true

security:
  credential_management:
    use_secrets_manager: true
    credential_file: ".dix_secrets.env"
    api_keys_required: false
  data_security:
    enabled: true
    blocked_operations: ["eval", "exec", "compile"]
    blocked_data_types: ["object"]
    max_file_size: 104857600
    allowed_formats: ["csv", "json", "parquet", "excel"]
  input_validation:
    enabled: true
    max_size_mb: 100
    schema_validation: true
  output_sanitization:
    enabled: true
    remove_sensitive_data: true

performance:
  cache_enabled: true
  cache_ttl: 60
  data_optimization:
    enabled: true
    use_caching: true
    memory_optimization: true
    parallel_processing: true
  timeout:
    operation_timeout: 600
    memory_limit: 1073741824
  memory_management:
    enabled: true
    garbage_collection_interval: 60
    memory_monitoring: true

monitoring:
  enabled: true
  metrics:
    enabled: true
    collection_interval: 30
    metrics_port: 9097
  logging:
    enabled: true
    log_level: "INFO"
    log_file: "logs/pandas.log"
  health_checks:
    enabled: true
    check_interval: 30
    data_health_check: true
    memory_health_check: true
  alerting:
    enabled: false

integration:
  enabled: true
  startup_order: 36
  dependencies:
    - "redis"
    - "numpy-service"
  auto_discovery:
    enabled: true
  data_flow:
    - source: "data_analysis"
      destination: "insights_cache"
      transform: "pandas_adapter"

pandas_configuration:
  display_settings:
    max_rows: 100
    max_columns: 20
    precision: 6
    float_format: '{:.6f}'
  computation_settings:
    mode_chained_assignment: "warn"
    copy_on_write: false
  optimization:
    use_numexpr: true
    use_bottleneck: true
    engine: "python"

data_limits:
  max_dataframe_rows: 1000000
  max_dataframe_columns: 1000
  max_memory_usage: 1073741824
  max_execution_time: 600

data_validation:
  enabled: true
  schema_validation: true
  dtype_validation: true
  missing_value_detection: true
  duplicate_detection: true

file_handling:
  enabled: true
  allowed_formats: ["csv", "json", "parquet", "excel"]
  chunk_size: 10000
  encoding: "utf-8"

testing:
  integration_tests:
    enabled: true
    test_directory: "containers/github_repos/pandas/tests"
    test_timeout: 300
  unit_tests:
    enabled: true
    coverage_threshold: 80

documentation:
  api_docs:
    enabled: true
    generate_on_build: true
  integration_guide:
    enabled: true
    location: "docs/integrations/pandas.md"

deployment:
  environment: "development"
  scaling:
    min_instances: 1
    max_instances: 3
    target_cpu_percent: 70
  rollout_strategy:
    type: "rolling"
    max_unavailable: 1
    max_surge: 1
