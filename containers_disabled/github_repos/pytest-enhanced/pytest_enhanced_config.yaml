repository:
  name: "pytest-enhanced"
  url: "https://github.com/pytest-dev/pytest.git"
  version: "7.4.3"
  description: "Pytest enhanced testing for advanced validation"

domain:
  type: "SYSTEM"
  priority: "HIGH"
  category: "enhanced_testing"

container:
  enabled: true
  image: "dix-pytest-enhanced:latest"
  build:
    dockerfile: "containers/github_repos/pytest-enhanced/Dockerfile"
    context: "containers/github_repos/pytest-enhanced"
  ports:
    - "9144:9144"
  volumes:
    - "./containers/github_repos/pytest-enhanced/config:/app/config"
    - "./containers/github_repos/pytest-enhanced/data:/app/data"
    - "./containers/github_repos/pytest-enhanced/logs:/app/logs"
    - "./containers/github_repos/pytest-enhanced/tests:/app/tests"
  environment:
    - "PYTEST_ENHANCED_LOG_LEVEL=INFO"
    - "PYTEST_ENHANCED_PERMISSION_LEVEL=READ_ONLY"
  resources:
    memory_limit: "512M"
    cpu_limit: "1.0"
    memory_reservation: "256M"
    cpu_reservation: "0.5"
  health_check:
    enabled: true
    interval: "30s"
    timeout: "10s"
    retries: 3

governance:
  enabled: true
  permission_level: "READ_ONLY"
  testing_limits:
    max_test_duration: 600
    max_parallel_tests: 100
    max_test_suites: 50

adapter:
  type: "PytestEnhancedDomainAdapter"
  concept_mappings:
    test: "enhanced_validation_procedure"
    fixture: "test_setup"
