repository:
  name: "blackbox"
  url: "https://github.com/prometheus/blackbox_exporter.git"
  version: "latest"
  description: "Blackbox monitoring for system health"

domain:
  type: "SYSTEM"
  priority: "HIGH"
  category: "blackbox_monitoring"

container:
  enabled: true
  image: "dix-blackbox:latest"
  build:
    dockerfile: "containers/github_repos/blackbox/Dockerfile"
    context: "containers/github_repos/blackbox"
  ports:
    - "9134:9134"
  volumes:
    - "./containers/github_repos/blackbox/config:/app/config"
    - "./containers/github_repos/blackbox/data:/app/data"
    - "./containers/github_repos/blackbox/logs:/app/logs"
    - "./containers/github_repos/blackbox/probes:/app/probes"
  environment:
    - "BLACKBOX_LOG_LEVEL=INFO"
    - "BLACKBOX_PERMISSION_LEVEL=READ_ONLY"
  resources:
    memory_limit: "512M"
    cpu_limit: "1.0"
    memory_reservation: "256M"
    cpu_reservation: "0.5"
  health_check:
    enabled: true
    interval: "30s"
    timeout: "10s"
    retries: 3

governance:
  enabled: true
  permission_level: "READ_ONLY"
  monitoring_limits:
    max_probes_per_minute: 1000
    max_probe_timeout: 30
    max_concurrent_probes: 100

adapter:
  type: "BlackboxDomainAdapter"
  concept_mappings:
    probe: "system_check"
    target: "monitored_endpoint"
