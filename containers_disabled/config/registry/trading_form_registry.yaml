# Trading Form Optimization Registry
# DIX VISION v42.2 - Phase 1 Trading Form Configuration
# Optimal signal-world ratios for each trading form

trading_forms:
  # Market Trading Categories
  discretionary_hybrid:
    id: tf_001
    name: Discretionary Hybrid
    category: discretionary_hybrid
    domain: crypto
    timeframe: swing
    execution_mode: semi_auto
    description: "Combination of discretionary and systematic approaches"
    
    # Signal-First Configuration
    signal_first:
      optimal_ratio:
        signal: 0.85
        world: 0.15
      allowed_range:
        signal: [0.70, 0.95]
        world: [0.05, 0.30]
      auto_adjust_for_regime: true
      preferred_signal_ratio: 0.85
      
    # Performance Characteristics
    performance:
      typical_win_rate: 0.65
      sharpe_ratio_target: 1.8
      max_drawdown_limit: 0.15
      
    # Operational Requirements
    operational:
      latency_requirement_ms: 100
      data_sources:
        - orderbook
        - trades
        - social
        - news
      min_account_balance_usd: 10000
      
    # Signal-First Integration
    signal_first_compatibility: true
    dashboard_control_enabled: true
    world_context_integration: true
    
