# Execution Registry
# DIX VISION v42.2 - Execution Parameters Configuration

version: "1.0.0"
created_date: "2026-06-21"
updated_date: "2026-06-21"
compatible_with: "DIX VISION v42.2+"

# Signal-First Integration
signal_first_integration:
  enabled: true
  execution_signal_ratio: 0.85
  execution_world_ratio: 0.15
  dashboard_control_enabled: true
  description: "Execution system with signal-first integration"

# Execution Configuration
execution_config:
  # Order Routing
  order_routing:
    enabled: true
    routing_strategy: "smart_routing"
    venues:
      - primary: "binance"
      - secondary: "coinbase"
    order_type: "limit"  # Options: market, limit, stop_limit
    time_in_force: "GTC"  # Options: GTC, IOC, FOK
    
    # Signal-First Order Routing
    signal_first_order_routing:
      enabled: true
      high_signal_confidence: "aggressive_routing"
      standard_confidence: "standard_routing"
      low_signal_confidence: "conservative_routing"
  
  # Slippage Management
  slippage:
    max_allowed_slippage: 0.001  # 0.1%
    slippage_tolerance: 0.0005  # 0.05%
    slippage_adjustment: true
    adaptive_slippage: true
    
    # Signal-First Slippage Adjustment
    signal_first_slippage:
      enabled: true
      high_signal_confidence: "allow_higher_slippage"
      low_signal_confidence: "require_lower_slippage"
  
  # Latency Requirements
  latency:
    max_execution_latency_ms: 100
    target_execution_latency_ms: 50
    latency_monitoring: true
    latency_optimization: true
    
    # Signal-First Latency Adjustment
    signal_first_latency:
      enabled: true
      high_priority_executions: "ultra_low_latency"
      standard_executions: "normal_latency"
  
  # Position Sizing
  position_sizing:
    method: "risk_parity"  # Options: fixed_fraction, risk_parity, kelly
    default_position_size: 0.01  # 1% of portfolio
    max_position_size: 0.02  # 2% of portfolio
    
    # Signal-First Position Sizing
    signal_first_position_sizing:
      enabled: true
      high_signal_confidence: "increase_position_by_20%"
      standard_confidence: "normal_position_size"
      low_signal_confidence: "decrease_position_by_20%"

# Execution Modes
execution_modes:
  automatic:
    enabled: true
    requires_approval: false
    governance_override: false
    description: "Fully automated execution"
    
  semi_automatic:
    enabled: true
    requires_approval: false
    governance_override: true
    description: "Semi-automated execution with operator oversight"
    
  manual:
    enabled: true
    requires_approval: true
    governance_override: false
    description: "Manual execution requiring approval"

# Order Types
order_types:
  market_order:
    enabled: true
    use_case: "urgent_execution"
    signal_first_optimization: true
    
  limit_order:
    enabled: true
    use_case: "price_control"
    signal_first_optimization: true
    
  stop_limit_order:
    enabled: true
    use_case: "risk_management"
    signal_first_optimization: false

# Execution Governance
execution_governance:
  require_approval_for_large_orders: true
  large_order_threshold: 0.01  # 1% of portfolio
  audit_trail_enabled: true
  real_time_monitoring: true
  
  # Signal-First Execution Governance
  signal_first_governance:
    enabled: true
    execution_compliance_check: true
    ratio_validation: true
    description: "Governance for signal-first execution"

# Error Handling
error_handling:
  retry_policy:
    enabled: true
    max_retries: 3
    retry_delay_ms: 100
    
  circuit_breaker:
    enabled: true
    failure_threshold: 5
    cooldown_period_minutes: 5
  
  # Signal-First Error Handling
  signal_first_error_handling:
    enabled: true
    high_signal_confidence: "aggressive_retry"
    low_signal_confidence: "conservative_retry"

# Version information
version: "1.0.0"
status: "ready_for_deployment"
