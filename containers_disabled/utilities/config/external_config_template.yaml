# External Repository Configuration Template
# This template provides the standard configuration structure for integrating
# external GitHub repositories into the DIX VISION system.

# Repository Identification
repository:
  name: "REPOSITORY_NAME"  # GitHub repository name (e.g., "ccxt", "langchain")
  url: "https://github.com/username/repo.git"
  version: "latest"  # or specific version tag
  description: "Repository description"

# Domain Classification
domain:
  type: "MARKET"  # MARKET, SYSTEM, COGNITIVE, EXECUTION, LEARNING, OBSERVABILITY
  priority: "CRITICAL"  # CRITICAL, HIGH, MEDIUM, LOW
  category: "trading_execution"  # Specific category

# Container Configuration
container:
  enabled: true
  image: "repository-name:latest"
  build:
    dockerfile: "containers/REPOSITORY_NAME/Dockerfile"
    context: "containers/REPOSITORY_NAME"
  ports:
    - "internal:external"  # e.g., "8080:8080"
  volumes:
    - "host_path:container_path"
  environment:
    - "ENV_VAR=value"
  resources:
    memory_limit: "512m"
    cpu_limit: "1.0"
    memory_reservation: "256m"
    cpu_reservation: "0.5"
  health_check:
    enabled: true
    interval: "30s"
    timeout: "10s"
    retries: 3
    command: "python health_check.py"

# Governance Configuration
governance:
  enabled: true
  permission_level: "READ_ONLY"  # NONE, READ_ONLY, EXECUTE, ADMIN
  safety_checks:
    enabled: true
    dangerous_keywords: ["delete", "drop", "destroy", "format"]
    input_validation: true
    output_sanitization: true
  audit_logging:
    enabled: true
    log_level: "INFO"
    retention_days: 90
  operator_authority:
    required_for_execution: true
    approval_timeout: "1h"
    emergency_override: true

# Adapter Configuration
adapter:
  type: "BaseDomainAdapter"  # MarketDomainAdapter, SystemDomainAdapter, etc.
  data_format: "JSON"  # JSON, CSV, XML, BINARY, STREAM, CUSTOM
  concept_mappings:
    external_concept: internal_concept
  transformations:
    - name: "transform1"
      enabled: true
      config: {}
  enhancements:
    add_metadata: true
    add_context: true
    cognitive_enhancement: false

# Security Configuration
security:
  credential_management:
    use_secrets_manager: true
    credential_file: ".dix_secrets.env"
  rate_limiting:
    enabled: true
    requests_per_minute: 100
    burst_size: 10
  input_validation:
    enabled: true
    max_size_mb: 10
    allowed_formats: ["json", "csv"]
  output_sanitization:
    enabled: true
    remove_sensitive_data: true
  encryption:
    enabled: false
    method: "aes-256"

# Performance Configuration
performance:
  cache_enabled: true
  cache_ttl: 300
  connection_pool:
    enabled: true
    max_connections: 10
    min_connections: 2
  timeout:
    connection: 30
    read: 60
    write: 30
  retry_policy:
    enabled: true
    max_retries: 3
    backoff_factor: 2

# Monitoring Configuration
monitoring:
  enabled: true
  metrics:
    enabled: true
    collection_interval: 60
    metrics_port: 9090
  logging:
    enabled: true
    log_level: "INFO"
    log_file: "logs/REPOSITORY_NAME.log"
  health_checks:
    enabled: true
    check_interval: 30
  alerting:
    enabled: false
    webhook_url: ""
    alert_conditions:
      - metric: "error_rate"
        threshold: 0.05
        operator: "greater_than"

# Integration Configuration
integration:
  enabled: true
  startup_order: 10  # Lower numbers start first
  dependencies:
    - "redis"
    - "postgres"
  auto_discovery:
    enabled: true
    scan_interval: 300
  data_flow:
    - source: "external_api"
      destination: "internal_cache"
      transform: "adapter"

# Testing Configuration
testing:
  integration_tests:
    enabled: true
    test_directory: "tests/test_REPOSITORY_NAME_integration.py"
    test_timeout: 300
  unit_tests:
    enabled: true
    coverage_threshold: 80
  performance_tests:
    enabled: false
    load_test_duration: 60

# Documentation Configuration
documentation:
  api_docs:
    enabled: true
    generate_on_build: true
  integration_guide:
    enabled: true
    location: "docs/integrations/REPOSITORY_NAME.md"
  examples:
    enabled: true
    location: "examples/REPOSITORY_NAME/"

# Deployment Configuration
deployment:
  environment: "development"  # development, staging, production
  scaling:
    min_instances: 1
    max_instances: 5
    target_cpu_percent: 70
  rollout_strategy:
    type: "rolling"
    max_unavailable: 1
    max_surge: 1

# Backup Configuration
backup:
  enabled: true
  schedule: "daily"
  retention: 7
  backup_location: "backups/REPOSITORY_NAME/"
