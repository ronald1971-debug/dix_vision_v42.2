  # -----------------------------------------------------------------
  # Trader feeds (Trader-Intelligence layer — Wave-04 PR-2)
  #
  # Producers parse adapter-specific payloads into
  # ``core.contracts.trader_intelligence.TraderModel`` data and hand
  # them to ``intelligence_engine.trader_modeling.aggregator``
  # (the only B29-allowed runtime constructor of ``TraderObservation``).
  # The aggregator wraps each one as a ``SystemEvent
  # (sub_kind=TRADER_OBSERVED)`` row on the existing 4-event bus.
  # -----------------------------------------------------------------
  - id: SRC-TRADER-TRADINGVIEW-001
    name: "TradingView ideas / alerts (read-only envelope ingest)"
    category: trader
    provider: tradingview
    endpoint: "https://www.tradingview.com"
    schema: "core.contracts.trader_intelligence.TraderModel"
    auth: none
    enabled: true
    critical: false
    notes: >-
      Read-only structured-envelope ingest path consumed by
      ui.feeds.tradingview_ideas (parser) and
      intelligence_engine.trader_modeling (aggregator). No live
      WebSocket / scrape — envelopes are pushed via
      ``POST /api/feeds/tradingview/observation`` from a webhook
      relay or operator. Per Wave-04 PR-2 architectural plan: the
      pipeline is the load-bearing artefact, not the specific source.

  # -----------------------------------------------------------------
  # AI providers (Cognitive Router Layer — registry-driven)
  #
  # Chat widgets (Indira Chat, Dyon Chat) read this section at boot
  # and on hot-reload; the provider list is NEVER hard-coded in
  # widget code. Adding a row here makes the provider appear in both
  # widgets automatically (subject to the chat widgets' authority
  # lint, which forbids string literals naming a specific provider).
  #
  # ``capabilities`` is the small extension that lets the router pick
  # providers per task class. Allowed tags are listed in
  # ``system_engine.scvs.source_registry.ALLOWED_AI_CAPABILITIES``.
  # -----------------------------------------------------------------
  - id: SRC-AI-OPENAI-001
    name: "OpenAI ChatGPT"
    category: ai
    provider: openai
    endpoint: "https://api.openai.com/v1"
    schema: "sensory.cognitive.contracts.AIResponse"
    auth: required
    enabled: true
    critical: false
    capabilities:
      - reasoning
      - code_gen
      - multimodal
      - tool_use
      - long_context
  - id: SRC-AI-GEMINI-001
    name: "Google Gemini"
    category: ai
    provider: google
    # ``v1beta`` is required for ``generateContent`` with system
    # prompts and ``responseMimeType``; ``v1`` rejects those fields.
    # Must stay in sync with ``GoogleGeminiChatTransport.BASE_URL``.
    endpoint: "https://generativelanguage.googleapis.com/v1beta"
    schema: "sensory.cognitive.contracts.AIResponse"
    auth: required
    enabled: true
    critical: false
    capabilities:
