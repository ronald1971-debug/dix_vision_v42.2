# === Governance Configuration ===

governance:
  lifecycle_states:
    PROPOSED:
      description: "New archetype proposed for evaluation"
      approval_required: true
      approval_levels: ["governance", "operator"]
    
    ACTIVE:
      description: "Archetype active in production"
      approval_required: false
      governance_check: true
    
    DECAYING:
      description: "Archetype showing performance decline"
      approval_required: false
      monitoring_required: true
    
    DEMOTED:
      description: "Archetype removed from active rotation"
      approval_required: true
      approval_levels: ["governance", "operator"]
  
  decay_management:
    auto_decay_detection: true
    decay_threshold: 0.7
    performance_threshold: 0.3
    automatic_transition: false
    governance_approval_required: true